schema_version: 1
surface: "rockie-nugget-overlay"
description: >-
  Public attribution manifest for the Rockie nugget overlay. The nugget overlay
  is config-only and does not mirror platform skill SKILL.md files. Community
  skill credit therefore stays readable here as an explicit manifest instead of
  synthetic skill mirrors.

attribution:
  schema_version: 1
  authors:
    - rockie_username: "rockie-maintainers"
      display_name: "Rockie Maintainers"
      profile_refs: ["github:Rockielab"]
  maintainers:
    - rockie_username: "rockie-maintainers"
      display_name: "Rockie Maintainers"
      profile_refs: ["github:Rockielab"]
  profiles:
    github:Rockielab:
      provider: "github"
      url: "https://github.com/Rockielab"
      verified: false
  source:
    repo: "Rockielab/rockie-nugget"
    path: "overlay/ATTRIBUTION.yaml"
    version: "2026-06-20"
    url: "https://github.com/Rockielab/rockie-nugget/tree/main/overlay"
  contact_policy:
    maintainer_contact: "profile_public_only"
    contribution_channel: "product_proposals"
  completeness: "complete"

upstream_skill_attributions:
  source_manifest:
    repo: "Rockielab/platform-skills"
    path: "skills/*/SKILL.md"
    url: "https://github.com/Rockielab/platform-skills/tree/main/skills"
